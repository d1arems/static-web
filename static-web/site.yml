---
- name: Prepare Web Servers
  hosts: webservers
  become: yes
  vars:
    app_source: "./files/index.html"
    app_dest: "/var/www/html/index.html"

  tasks:
    - name: Update apt cache and install Nginx
      apt:
        name: nginx
        state: present
        update_cache: yes

    - name: Ensure Nginx is started and enabled
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy Finance App Static Content
      copy:
        src: "{{ app_source }}"
        dest: "{{ app_dest }}"
        owner: www-data
        group: www-data
        mode: '0644'
      notify: Reload Nginx

  handlers:
    - name: Reload Nginx
      service:
        name: nginx
        state: reloaded
